"$schema" = "https://raw.githubusercontent.com/JanDeDobbeleer/oh-my-posh/main/themes/schema.json"
console_title_template = "{{if .Segments.Git.RepoName}}{{.Segments.Git.RepoName}} {{else}} {{.Folder}} {{end}}"
final_space = true
version = 3

[transient_prompt]
background = "transparent"
foreground = "#ffffff"
template = "$ "


[[blocks]]
type = "prompt"
alignment = "left"
newline = true

[[blocks.segments]]
type = "session"
foreground = "#757575"
style = "plain"
template = "{{ if .SSHSession }}¯¼║ {{ .UserName }}@{{ .HostName }}{{ else }}{{ .UserName }}{{ end }} "

[blocks.segments.properties]
display_host = true

[[blocks.segments]]
type = "path"
background = "#91ddff"
foreground = "#100e23"
powerline_symbol = "¯é░"
style = "powerline"
template = " {{ if and .Segments.Git.RepoName (ne .Segments.Git.RepoName .Path) }}{{ .Segments.Git.UpstreamIcon }} {{ .Segments.Git.RepoName }}{{ trimPrefix .Segments.Git.Dir .PWD }}{{ else }}{{ path .Path .Location }}{{ end }} "

[blocks.segments.properties]
style = "agnoster_full"


[[blocks.segments]]
type = "project"
style = "powerline"
powerline_symbol = "¯é░"
foreground = "#100e23"
background = "#fcea47"
template = " {{ if .Error }}{{ .Error }}{{ else }}{{ if .Version }}´Æç {{.Version}}{{ end }}{{ end }} "

[[blocks.segments]]
type = "git"
style = "powerline"
powerline_symbol = "¯é░"
foreground = "#100e23"
background = "#95ffa4"
background_templates = [
  "{{ if or (.Working.Changed) (.Staging.Changed) }}#ff9248{{ end }}",
  "{{ if and (gt .Ahead 0) (gt .Behind 0) }}#f26d50{{ end }}",
  "{{ if gt .Ahead 0 }}#89d1dc{{ end }}",
  "{{ if gt .Behind 0 }}#c5b6ad{{ end }}",
]
template = " {{ .HEAD }}{{if .BranchStatus }} {{ .BranchStatus }}{{ end }}{{ if .Working.Changed }} {{ .Working.String }}{{ end }}{{ if and (.Working.Changed) (.Staging.Changed) }} Ôöé{{ end }}{{ if .Staging.Changed }} {{ .Staging.String }}{{ end }}{{ if gt .StashCount 0 }} {{ .StashCount }}{{ end }} "

[blocks.segments.properties]
# Fetching information
fetch_upstream_icon = true
fetch_status = true
# Icons
branch_icon = "¯£Ñ "
branch_identical_icon = "Ôëí"
branch_ahead_icon = "Ôåæ"
branch_behind_icon = "Ôåô"
branch_gone = "Ôëó"
# HEAD
commit_icon = "¯£® "
tag_icon = "´ÉÆ "
rebase_icon = "¯£ª "
cherry_pick_icon = "Ô£ô "
revert_icon = "´ôø"
merge_icon = "¯£º "
no_commits_icon = "[no commits]"

[blocks.segments.properties.untracked_modes]
"/Users/user/Projects/oh-my-posh/" = "no"

[[blocks.segments]]
type = "status"
background = "#ff8080"
foreground = "#ffffff"
powerline_symbol = "¯é░"
style = "powerline"
template = " {{ if ne .Code 0 }}¯»╗ {{ .Code }}{{ end }} "

[[blocks.segments]]
type = "executiontime"
style = "plain"
foreground = "#689f38"
template = " ¾░äë {{ .FormattedMs }} "

[blocks.segments.properties]
threshold = 500
style = "austin"


[[blocks]]
type = "prompt"
alignment = "left"
newline = true

[[blocks.segments]]
type = "text"
foreground = "#ffffff"
style = "plain"
template = "$"


[[tooltips]]
style = "diamond"
foreground = "#100e23"
background = "#e4e140"
leading_diamond = "¯éÂ"
trailing_diamond = "¯é┤"
type = "python"
tips = ["uv", "python", "pip"]
template = "¯êÁ{{ if .Venv }} ({{ .Venv }}){{ end }} {{ .Full }}"

[tooltips.properties]
display_mode = "context"


[[tooltips]]
style = "diamond"
foreground = "#100e23"
background = "#e4e140"
leading_diamond = "¯éÂ"
trailing_diamond = "¯é┤"
type = "bun"
tips = ["bun"]
template = "¯Ø» {{ .Full }}"


[[tooltips]]
style = "diamond"
foreground = "#100e23"
background = "#e4e140"
leading_diamond = "¯éÂ"
trailing_diamond = "¯é┤"
type = "node"
tips = ["npm"]
template = "¯£ÿ {{ .Full }}"
