"$schema" = "https://raw.githubusercontent.com/JanDeDobbeleer/oh-my-posh/main/themes/schema.json"
console_title_template = "{{if .Segments.Git.RepoName}}{{.Segments.Git.RepoName}} {{else}} {{.Folder}} {{end}}"
final_space = true
version = 3

[transient_prompt]
background = "transparent"
foreground = "#ffffff"
template = "$ "


[[blocks]]
type = "prompt"
alignment = "left"
newline = true

[[blocks.segments]]
type = "session"
foreground = "#757575"
style = "plain"
template = "{{ if .SSHSession }} {{ .UserName }}@{{ .HostName }}{{ else }}{{ .UserName }}{{ end }} "

[blocks.segments.properties]
display_host = true

[[blocks.segments]]
type = "path"
background = "#91ddff"
foreground = "#050510"
powerline_symbol = ""
style = "powerline"
template = " {{ if and .Segments.Git.RepoName (ne .Segments.Git.RepoName .Path) }}{{if .Segments.Git.UpstreamIcon }}{{ .Segments.Git.UpstreamIcon }}{{ else }}{{ end }} {{ .Segments.Git.RepoName }}{{ trimPrefix .Segments.Git.Dir .PWD }}{{ else }}{{ path .Path .Location }}{{ end }} "

[blocks.segments.properties]
style = "agnoster_full"


[[blocks.segments]]
type = "project"
style = "powerline"
powerline_symbol = ""
foreground = "#050510"
background = "#fcea47"
template = " {{ if .Error }}{{ .Error }}{{ else }}{{ if .Version }} {{.Version}}{{ end }}{{ end }} "

[[blocks.segments]]
type = "git"
style = "powerline"
powerline_symbol = ""
foreground = "#050510"
background = "#95ffa4"
background_templates = [
  "{{ if or (.Working.Changed) (.Staging.Changed) }}#ff9248{{ end }}",
  "{{ if and (gt .Ahead 0) (gt .Behind 0) }}#FF8870{{ end }}",
  "{{ if gt .Ahead 0 }}#89d1dc{{ end }}",
  "{{ if gt .Behind 0 }}#c5b6ad{{ end }}",
]
template = " {{ .HEAD }}{{if .BranchStatus }} {{ .BranchStatus }}{{ end }}{{ if .Working.Changed }} {{ .Working.String }}{{ end }}{{ if and (.Working.Changed) (.Staging.Changed) }} │{{ end }}{{ if .Staging.Changed }} {{ .Staging.String }}{{ end }}{{ if gt .StashCount 0 }} {{ .StashCount }}{{ end }} "

[blocks.segments.properties]
# Fetching information
fetch_upstream_icon = true
fetch_status = true
# Icons
branch_icon = " "
branch_identical_icon = "≡"
branch_ahead_icon = "↑"
branch_behind_icon = "↓"
branch_gone = "≢"
# HEAD
commit_icon = " "
tag_icon = " "
rebase_icon = " "
cherry_pick_icon = "✓ "
revert_icon = ""
merge_icon = " "
no_commits_icon = "[no commits]"

[blocks.segments.properties.untracked_modes]
"/Users/user/Projects/oh-my-posh/" = "no"

[[blocks.segments]]
type = "status"
background = "#ff8080"
foreground = "#ffffff"
powerline_symbol = ""
style = "powerline"
template = " {{ if ne .Code 0 }} {{ .Code }}{{ end }} "

[[blocks.segments]]
type = "executiontime"
style = "plain"
foreground = "#689f38"
template = " 󰄉 {{ .FormattedMs }} "

[blocks.segments.properties]
threshold = 500
style = "austin"


[[blocks]]
type = "prompt"
alignment = "left"
newline = true

[[blocks.segments]]
type = "python"
style = "plain"
foreground = "#e4e140"
template = "  "

[[blocks.segments]]
type = "rust"
style = "plain"
foreground = "red"
template = "\uE7A8 "

[[blocks.segments]]
type = "text"
foreground = "#ffffff"
style = "plain"
template = "$"
